<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Fastman - Quay Tên Lớp Học (50 Ô)</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 90%; /* Tăng chiều rộng để chứa nhiều ô hơn */
            max-width: 1000px;
            height: 600px;
            border: 4px solid #0051ff;
            background: black;
            overflow: hidden;
            margin-top: 10px;
        }

        /* Khu vực chứa các ô cửa dạng lưới */
        #door-grid {
            display: flex;
            flex-wrap: wrap; /* Cho phép rớt dòng */
            width: 100%;
            background: #222;
        }

        .door {
            width: calc(10% - 2px); /* 10 cột mỗi hàng */
            height: 40px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            background: #222;
            box-sizing: border-box;
            overflow: hidden;
            text-align: center;
        }

        #fastman {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #f1c40f;
            border-radius: 50%;
            z-index: 10;
            clip-path: polygon(100% 0%, 100% 35%, 50% 50%, 100% 65%, 100% 100%, 0% 100%, 0% 0%);
            display: flex;
            justify-content: center;
        }

        #fastman::after {
            content: '';
            position: absolute;
            top: 6px;
            left: 18px;
            width: 4px;
            height: 4px;
            background-color: black;
            border-radius: 50%;
        }

        .controls { margin: 20px; text-align: center; width: 800px; }
        textarea { width: 100%; height: 80px; background: #333; color: white; border: 1px solid #555; padding: 10px; }
        button { padding: 10px 25px; background: #f1c40f; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #counter { font-size: 20px; color: #f1c40f; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Fastman: Quay Tên 50 Học Sinh</h1>

    <div class="controls">
        <p>Nhập danh sách tên (mỗi tên 1 dòng):</p>
        <textarea id="nameInput" placeholder="Dán danh sách 50 tên vào đây..."></textarea>
        <br>
        <button onclick="setupAndStart()">BẮT ĐẦU QUAY</button>
        <div id="counter">VA CHẠM: 0 / 15</div>
    </div>

    <div id="game-container">
        <div id="door-grid"></div>
        <div id="fastman" style="display:none;"></div>
    </div>

    <script>
        const fastman = document.getElementById('fastman');
        const container = document.getElementById('game-container');
        const doorGrid = document.getElementById('door-grid');
        const counterText = document.getElementById('counter');

        let posX, posY, vx, vy, bounces = 0;
        let isRunning = false;
        const size = 30;
        const maxBounces = 10; // Tăng số lần va chạm cho kịch tính

        function setupAndStart() {
            if (isRunning) return;

            const names = document.getElementById('nameInput').value.split('\n').filter(n => n.trim() !== "");
            if (names.length === 0) return alert("Vui lòng nhập tên!");

            doorGrid.innerHTML = "";
            names.forEach(name => {
                const div = document.createElement('div');
                div.className = 'door';
                div.innerText = name;
                doorGrid.appendChild(div);
            });

            // Lấy chiều cao của khu vực lưới cửa để Fastman không va chạm đè lên
            const gridHeight = doorGrid.offsetHeight;

            posX = container.clientWidth / 2;
            posY = container.clientHeight - 50;
            vx = (Math.random() > 0.5 ? 7 : -7);
            vy = -7;
            bounces = 0;
            isRunning = true;
            
            fastman.style.display = 'block';
            fastman.style.transition = 'none';
            
            animate();
        }

        function animate() {
            if (!isRunning) return;

            posX += vx;
            posY += vy;

            // Va chạm biên
            if (posX <= 0 || posX >= container.clientWidth - size) vx *= -1;
            if (posY >= container.clientHeight - size) vy *= -1;

            // Va chạm với cạnh dưới của lưới cửa
            const gridBottom = doorGrid.offsetHeight;
            if (posY <= gridBottom && bounces < maxBounces) {
                vy *= -1;
                bounces++;
                counterText.innerText = `VA CHẠM: ${bounces} / ${maxBounces}`;
            }

            fastman.style.left = posX + 'px';
            fastman.style.top = posY + 'px';

            if (bounces < maxBounces) {
                requestAnimationFrame(animate);
            } else {
                finish();
            }
        }

        function finish() {
            isRunning = false;
            const doors = document.querySelectorAll('.door');
            const winIndex = Math.floor(Math.random() * doors.length);
            const target = doors[winIndex];

            // Di chuyển đến ô thắng
            fastman.style.transition = "all 0.8s cubic-bezier(0.25, 0.1, 0.25, 1)";
            fastman.style.left = (target.offsetLeft + target.clientWidth/2 - size/2) + 'px';
            fastman.style.top = (target.offsetTop + target.clientHeight/2 - size/2) + 'px';

            setTimeout(() => {
                target.style.background = "#f1c40f";
                target.style.color = "black";
                target.style.fontWeight = "bold";
                alert("Chúc mừng: " + target.innerText);
            }, 900);
        }
    </script>
</body>
</html>
