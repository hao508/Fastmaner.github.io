<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Fastman Pro - Quay Tên Lớp Học</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        #game-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 500px;
            border: 4px solid #0051ff;
            background: #000;
            overflow: hidden;
            border-radius: 10px;
            margin-top: 20px;
        }

        #door-grid {
            display: flex;
            flex-wrap: wrap;
            width: 100%;
            background: rgba(255,255,255,0.05);
        }

        .door {
            width: calc(10% - 2px);
            height: 45px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            background: #222;
            box-sizing: border-box;
        }

        /* Tạo hình Pacman */
        #fastman {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #f1c40f;
            border-radius: 50%;
            z-index: 10;
            /* Miệng Pacman */
            clip-path: polygon(100% 0%, 100% 35%, 50% 50%, 100% 65%, 100% 100%, 0% 100%, 0% 0%);
        }

        #winModal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            padding: 30px;
            border: 3px solid #f1c40f;
            border-radius: 20px;
            z-index: 100;
            text-align: center;
            box-shadow: 0 0 50px rgba(241, 196, 15, 0.4);
        }

        #winModal.active { display: block; }

        .controls { margin: 20px; text-align: center; width: 800px; }
        textarea { width: 100%; height: 80px; background: #333; color: white; border-radius: 8px; padding: 10px; }
        button { padding: 12px 30px; background: #f1c40f; border: none; font-weight: bold; cursor: pointer; border-radius: 25px; margin-top: 10px; }
        #counter { font-size: 24px; color: #f1c40f; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>FASTMAN: CLASS EDITION</h1>

    <div class="controls">
        <textarea id="nameInput" placeholder="Dán danh sách tên học sinh vào đây..."></textarea><br>
        <button onclick="setupAndStart()">BẮT ĐẦU QUAY</button>
        <div id="counter">VA CHẠM: 0 / 15</div>
    </div>

    <div id="game-container">
        <div id="door-grid"></div>
        <div id="fastman" style="display:none;"></div>
    </div>

    <div id="winModal">
        <h2 style="color: #f1c40f;">🎉 CHÚC MỪNG 🎉</h2>
        <div id="winnerName" style="font-size: 32px; font-weight: bold; margin: 20px 0;"></div>
        <button onclick="closeModal()">TIẾP TỤC</button>
    </div>

    <!-- Âm thanh -->
    <audio id="bounceSound" src="bounce.mp3"></audio>
    <audio id="winSound" src="https://www.myinstants.com/media/sounds/happy-happy-happy-cat.mp3"></audio>

    <script>
        const fastman = document.getElementById('fastman');
        const container = document.getElementById('game-container');
        const doorGrid = document.getElementById('door-grid');
        const counterText = document.getElementById('counter');
        const bounceSound = document.getElementById('bounceSound');
        const winSound = document.getElementById('winSound');
        const winModal = document.getElementById('winModal');
        const winnerNameDiv = document.getElementById('winnerName');

        let posX, posY, vx, vy, bounces = 0;
        let isRunning = false;
        const size = 30;
        const maxBounces = 15;

        function setupAndStart() {
            if (isRunning) return;

            const names = document.getElementById('nameInput').value.split('\n').filter(n => n.trim() !== "");
            if (names.length === 0) return alert("Vui lòng nhập tên!");

            doorGrid.innerHTML = "";
            names.forEach(name => {
                const div = document.createElement('div');
                div.className = 'door';
                div.innerText = name;
                doorGrid.appendChild(div);
            });

            // Vị trí xuất phát
            posX = container.clientWidth / 2;
            posY = container.clientHeight - 50;
            vx = (Math.random() > 0.5 ? 6 : -6);
            vy = -6;
            bounces = 0;
            isRunning = true;
            
            fastman.style.display = 'block';
            fastman.style.transition = 'none';
            counterText.innerText = `VA CHẠM: 0 / ${maxBounces}`;
            
            animate();
        }

        function animate() {
            if (!isRunning) return;

            posX += vx;
            posY += vy;

            let hit = false;

            // Va chạm biên trái/phải
            if (posX <= 0) {
                posX = 2; // Chống dính biên trái
                vx *= -1;
                hit = true;
            } else if (posX >= container.clientWidth - size) {
                posX = container.clientWidth - size - 2; // Chống dính biên phải
                vx *= -1;
                hit = true;
            }

            // Va chạm biên dưới
            if (posY >= container.clientHeight - size) {
                posY = container.clientHeight - size - 2; // Chống dính biên dưới
                vy *= -1;
                hit = true;
            }

            // Va chạm lưới tên phía trên
            const gridBottom = doorGrid.offsetHeight;
            if (posY <= gridBottom) {
                posY = gridBottom + 2; // Đẩy Pacman xuống để không bị dính vào lưới
                vy *= -1;
                hit = true;
            }
            
        if (hit && bounces < maxBounces) {
            bounces++;

            if (bounceSound.paused) {
                bounceSound.currentTime = 0;
                bounceSound.play();
    }

            counterText.innerText = `VA CHẠM: ${bounces} / ${maxBounces}`;
}

            fastman.style.left = posX + 'px';
            fastman.style.top = posY + 'px';

            // Xoay Pacman theo hướng di chuyển
            const angle = Math.atan2(vy, vx) * (180 / Math.PI);
            fastman.style.transform = `rotate(${angle}deg)`;

            if (bounces < maxBounces) {
                requestAnimationFrame(animate);
            } else {
                finish();
            }
        }

        function finish() {
            isRunning = false;
            const doors = document.querySelectorAll('.door');
            const winIndex = Math.floor(Math.random() * doors.length);
            const target = doors[winIndex];

            // Hiệu ứng bay đến mục tiêu
            fastman.style.transition = "all 1s ease-out";
            fastman.style.left = (target.offsetLeft + target.clientWidth/2 - size/2) + 'px';
            fastman.style.top = (target.offsetTop + target.clientHeight/2 - size/2) + 'px';

            setTimeout(() => {
                target.style.background = "#f1c40f";
                target.style.color = "black";
                winnerNameDiv.innerText = target.innerText;
                winModal.classList.add('active');
                winSound.play(); // Nhạc Happy Happy Happy
            }, 1000);
        }

        function closeModal() {
            winModal.classList.remove('active');
            fastman.style.display = 'none';
            winSound.pause();
            winSound.currentTime = 0;
        }
    </script>
</body>
</html>
